        .grid-container {

            background: rgba(0, 0, 0, 0.8);
            transition: 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
            overflow: hidden;
        }

        .link-item:active {
            background-color: #ff007f;
            box-shadow: 0 0 20px #ff007f;
            color: black;
            transform: scale(0.9);
        }

        /* ปรับเหลือ 2 คอลัมน์สำหรับ iPhone จอแนวตั้ง */
        @media (max-width: 480px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .neon-header { width: 90%; }
        }

        /* สำหรับ iPad หรือจอที่กว้างขึ้น */
        @media (min-width: 768px) {

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const text = "Jomtub";
        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = [];

        function initDrops() {
            columns = Math.floor(canvas.width / fontSize);
            drops = [];
            for (let x = 0; x < columns; x++) {
                drops[x] = Math.random() * -100;
            }
        }
        initDrops();

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff007f'; 
            ctx.font = 'bold ' + fontSize + 'px arial';

                const char = text.charAt(Math.floor(Math.random() * text.length));

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {

                }

        }
